name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Minimale Testabhaengigkeiten installieren
        run: python -m pip install "fastapi>=0.110"

      - name: Python-Syntax pruefen
        run: python -m py_compile backend/*.py

      - name: JavaScript-Syntax pruefen
        run: node --check frontend/app.js

      - name: Shell-Skripte pruefen
        run: bash -n scripts/*.sh

      - name: Repository auf Artefakte pruefen
        run: |
          if git ls-files '*.zip' '*.bat' '*.sqlite3' '*.db' | grep -q .; then
            echo 'Release-Dateien, Windows-Batches oder Datenbanken duerfen nicht versioniert werden.'
            exit 1
          fi

      - name: Leere Datenbank initialisieren
        env:
          MANAVAULT_DB_PATH: /tmp/manavault-ci.sqlite3
        run: python -c "from backend.main import init_db; init_db(); print('database-init-ok')"
